<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            font-size: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .header a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .game-card {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 12px;
            justify-content: center;
        }

        .cell {
            width: 100px;
            height: 100px;
            font-size: 2em;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .cell:hover {
            transform: scale(1.08);
            background: #334155;
        }

        .cell.X { color: #22c55e; }
        .cell.O { color: #ef4444; }

        .scoreboard {
            margin-bottom: 20px;
        }

        select {
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            background: #1e293b;
            color: white;
        }

        /* 🎉 Modal */
        #resultModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1e293b;
            padding: 25px 40px;
            border-radius: 12px;
            text-align: center;
        }

        .modal-content button {
            margin-top: 15px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #38bdf8;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="header">
    <div>🎮 Game Portal</div>
    <a href="/">⬅ Back to Home</a>
</div>

<div class="container">
    <div class="game-card">

        <h1>❌⭕ Tic Tac Toe</h1>

        <div class="controls">
            <label>Difficulty:</label>
            <select onchange="setDifficulty(this.value)">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard" selected>Hard</option>
            </select>
        </div>

        <div class="scoreboard">
            🧑 Player: <span id="playerScore">0</span> |
            🤖 Computer: <span id="computerScore">0</span> |
            🤝 Draws: <span id="drawScore">0</span>
        </div>

        <div id="board"></div>

    </div>
</div>

<!-- 🎉 Custom Modal -->
<div id="resultModal">
    <div class="modal-content">
        <h2 id="resultText"></h2>
        <button onclick="closeModal()">OK</button>
    </div>
</div>

<script>
let boardDiv = document.getElementById("board");
let gameOver = false;

// ✅ Frontend state
let currentBoard = ["","","","","","","","",""];

let playerScore = 0;
let computerScore = 0;
let drawScore = 0;

function updateScoreboard() {
    document.getElementById("playerScore").innerText = playerScore;
    document.getElementById("computerScore").innerText = computerScore;
    document.getElementById("drawScore").innerText = drawScore;
}

function createBoard() {
    boardDiv.innerHTML = "";
    gameOver = false;

    for (let i = 0; i < 9; i++) {
        let cell = document.createElement("div");
        cell.className = "cell";
        cell.id = "cell-" + i;
        cell.onclick = () => makeMove(i);
        boardDiv.appendChild(cell);
    }

    currentBoard = ["","","","","","","","",""];
}

async function setDifficulty(level) {
    await fetch("/set_difficulty", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({level})
    });

    playerScore = 0;
    computerScore = 0;
    drawScore = 0;
    updateScoreboard();

    gameOver = true;
    createBoard();
}

async function makeMove(position) {
    if (gameOver) return;

    let res = await fetch("/move", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            position: position,
            board: currentBoard
        })
    });

    let data = await res.json();

    currentBoard = data.board;
    updateBoard(currentBoard);

    if (data.status === "win") {
        gameOver = true;

        if (data.winner === "X") playerScore++;
        else if (data.winner === "O") computerScore++;
        else drawScore++;

        updateScoreboard();

        // 🎉 Show custom popup
        if (data.winner === "X") showResult("🎉 You Win!");
        else if (data.winner === "O") showResult("🤖 Computer Wins!");
        else showResult("🤝 It's a Draw!");
    }
}

function updateBoard(board) {
    board.forEach((val, i) => {
        let cell = document.getElementById("cell-" + i);
        if (cell) {
            cell.innerText = val;
            cell.classList.remove("X", "O");

            if (val === "X") cell.classList.add("X");
            if (val === "O") cell.classList.add("O");
        }
    });
}

// 🎉 Modal Functions
function showResult(message) {
    document.getElementById("resultText").innerText = message;
    document.getElementById("resultModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("resultModal").style.display = "none";
    createBoard();
}

// Init
createBoard();
updateScoreboard();
</script>

</body>
</html>
